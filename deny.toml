[graph]
# Analyze the full dependency graph including dev and build dependencies.
all-features = false

[advisories]
# Warn on crates that have been yanked from crates.io.
ignore = []

[licenses]
# Minimum confidence threshold for license detection (0.0–1.0).
confidence-threshold = 0.8

allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
]

# No per-crate license exceptions needed for this project.
exceptions = []

[bans]
# No crate bans in Phase 1.
multiple-versions = "allow"
wildcards = "allow"

[sources]
# Only allow crates from crates.io.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
